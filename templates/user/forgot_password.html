<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f7f9fc;
            font-family: Arial, sans-serif;
        }
        .forgot-password-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #c0392b;
            border: none;
        }
        .btn-primary:hover {
            background-color: #8d8d8d;
        }
        .form-control:focus {
            border-color: #c0392b;
            box-shadow: 0 0 0 0.2rem rgba(72, 201, 176, 0.25);
        }
        .alert {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <h2 class="text-center">Forgot Password</h2>
        <p class="text-center text-muted">Enter your email or phone number to reset your password.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div>
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="mb-3">
                <label for="identifier" class="form-label">Email or Phone</label>
                <input type="text" class="form-control" id="identifier" name="identifier" placeholder="Enter your email or phone" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-decoration-none">Back to Login</a>
        </div>
        <div class="text-center mt-3">
            <a href="{{ url_for('hompage') }}" class="text-decoration-none">Back to Homepage</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
